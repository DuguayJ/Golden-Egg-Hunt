<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🗝️ You Found the Final Key!</title>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --yolk:    #FFD93D;
      --coral:   #FF6B6B;
      --mint:    #6BCB77;
      --sky:     #4D96FF;
      --lavender:#C77DFF;
      --cream:   #FFF8F0;
      --deep:    #1a1a2e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--deep);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Grass ── */
    .grass {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, #2d6a2d, #4caf50 60%, transparent);
      z-index: 1;
      pointer-events: none;
    }
    .grass::before {
      content: '';
      position: absolute;
      top: -30px; left: 0; right: 0;
      height: 60px;
      background:
        radial-gradient(ellipse 8px 30px at 5% 100%,  #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 9% 100%,  #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 13% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 18% 100%, #56c656 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 22% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 27% 100%, #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 32% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 37% 100%, #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 42% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 47% 100%, #56c656 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 53% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 58% 100%, #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 63% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 68% 100%, #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 73% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 78% 100%, #56c656 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 83% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 88% 100%, #4caf50 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 93% 100%, #3a8c3a 49%, transparent 50%),
        radial-gradient(ellipse 8px 30px at 97% 100%, #4caf50 49%, transparent 50%);
    }

    /* ── Night sky ── */
    .stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .star {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: white;
      animation: twinkle 2s infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: .2; transform: scale(1); }
      to   { opacity: 1;  transform: scale(1.6); }
    }

    /* ── Floating eggs in background ── */
    .bg-egg {
      position: fixed;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: .18;
      animation: floatUp linear infinite;
      z-index: 0;
    }
    @keyframes floatUp {
      from { transform: translateY(110vh) rotate(0deg); }
      to   { transform: translateY(-20vh) rotate(360deg); }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(18px);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 36px;
      padding: 56px 52px 52px;
      max-width: 580px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,217,61,.12), 0 0 0 1px rgba(255,255,255,.05);
      animation: cardIn .9s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(60px) scale(.88); }
      to   { opacity:1; transform: translateY(0)   scale(1); }
    }

    /* ── Egg hero ── */
    .egg-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .big-egg {
      width: 110px; height: 140px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(135deg, var(--yolk) 0%, var(--coral) 40%, var(--lavender) 80%);
      position: relative;
      animation: eggBob 2.4s ease-in-out infinite, eggGlow 2.4s ease-in-out infinite;
      cursor: pointer;
      transition: transform .15s;
      user-select: none;
      -webkit-user-select: none;
    }
    .big-egg:hover { transform: scale(1.08); }
    .big-egg::before {
      content: '';
      position: absolute;
      top: 18px; left: 14px;
      width: 28px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      transform: rotate(-30deg);
      pointer-events: none;
    }
    .big-egg::after {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 22px;
      margin-top: -11px;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.3) 25%, transparent 25%) -10px 0,
        linear-gradient(225deg, rgba(255,255,255,.3) 25%, transparent 25%) -10px 0,
        linear-gradient(315deg, rgba(255,255,255,.3) 25%, transparent 25%),
        linear-gradient(45deg,  rgba(255,255,255,.3) 25%, transparent 25%);
      background-size: 20px 20px;
    }

    @keyframes eggBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-14px) rotate(3deg); }
    }
    @keyframes eggGlow {
      0%,100% { box-shadow: 0 0 30px rgba(255,217,61,.4), 0 0 60px rgba(255,107,107,.2); }
      50%      { box-shadow: 0 0 60px rgba(255,217,61,.7), 0 0 100px rgba(199,125,255,.4); }
    }

    /* ── Progress dots ── */
    .progress {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.3);
      transition: all .4s;
    }
    .dot.filled { background: var(--yolk); border-color: var(--yolk); box-shadow: 0 0 10px var(--yolk); }
    .dot.current {
      background: var(--coral);
      border-color: var(--coral);
      box-shadow: 0 0 18px var(--coral);
      animation: pulseDot 1s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.35); }
    }

    /* ── Typography ── */
    .label {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: .85rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--yolk);
      margin-bottom: 10px;
      opacity: .9;
    }
    h1 {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      line-height: 1.1;
      color: var(--cream);
      margin-bottom: 14px;
      text-shadow: 0 4px 24px rgba(255,107,107,.4);
    }
    h1 span { color: var(--yolk); }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(255,248,240,.6);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* ── Word reveal ── */
    .word-box {
      background: linear-gradient(135deg, rgba(255,217,61,.12), rgba(199,125,255,.12));
      border: 2px solid rgba(255,217,61,.3);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }
    .word-box::before {
      content: '✦';
      position: absolute;
      top: 10px; right: 16px;
      font-size: 1.2rem;
      color: var(--yolk);
      opacity: .5;
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .word-label {
      font-size: .78rem;
      font-weight: 900;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,248,240,.5);
      margin-bottom: 10px;
    }
    .secret-word {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(2.6rem, 9vw, 4rem);
      color: var(--yolk);
      letter-spacing: .06em;
      text-shadow: 0 0 40px rgba(255,217,61,.6), 0 4px 0 rgba(0,0,0,.3);
      animation: wordPop .8s cubic-bezier(.34,1.56,.64,1) 1s both;
    }
    @keyframes wordPop {
      from { opacity:0; transform: scale(.5) rotate(-6deg); }
      to   { opacity:1; transform: scale(1)  rotate(0deg); }
    }

    /* ── Confetti burst ── */
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Bunnies ── */
    .bunny {
      font-size: 1.9rem;
      display: inline-block;
      animation: bunnyBounce 1.4s ease-in-out infinite;
      cursor: default;
      user-select: none;
    }
    .bunny:nth-child(2) { animation-delay: .2s; }
    .bunny:nth-child(3) { animation-delay: .4s; }
    @keyframes bunnyBounce {
      0%,100% { transform: translateY(0); }
      40%      { transform: translateY(-10px); }
    }
    .bunnies { margin-bottom: 8px; }

    /* ── Footer ── */
    .footer-text {
      font-size: .82rem;
      color: rgba(255,248,240,.3);
      margin-top: 12px;
      letter-spacing: .06em;
    }

    /* ── Sparkles ── */
    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      animation: sparkleFly 1.2s ease-out forwards;
      z-index: 9999;
    }
    @keyframes sparkleFly {
      0%   { opacity:1; transform: translate(0,0) scale(1); }
      100% { opacity:0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div id="bgEggs"></div>

  <div class="card" id="card">
    <div class="bunnies">
      <span class="bunny">🐰</span>
      <span class="bunny">🐣</span>
      <span class="bunny">🐰</span>
    </div>

    <div class="progress" id="progress"></div>

    <div class="label">Easter Egg Hunt 2025</div>
    <h1>You Found the <span>Final&nbsp;Key!</span></h1>
    <p class="subtitle">You've collected all 5 keys to unlock the egg.<br>Here's your last secret word:</p>

    <div class="egg-wrap">
      <div class="big-egg" id="bigEgg"></div>
    </div>

    <div class="word-box">
      <div class="word-label">Key 5 of 5 · Your Secret Word is</div>
      <div class="secret-word">BLOOM</div>
    </div>

    <div class="footer-text">🌷 Combine all 5 words to unlock the Easter egg! 🌷</div>
  </div>

  <div class="grass"></div>

  <script>
    /* Stars */
    var starContainer = document.getElementById('stars');
    for (var i = 0; i < 120; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.cssText =
        'left:' + (Math.random()*100) + '%;' +
        'top:' + (Math.random()*80) + '%;' +
        'animation-delay:' + (Math.random()*3) + 's;' +
        'animation-duration:' + (1.5+Math.random()*2) + 's;' +
        'width:' + (1+Math.random()*3) + 'px;' +
        'height:' + (1+Math.random()*3) + 'px;' +
        'opacity:' + (Math.random()*.8) + ';';
      starContainer.appendChild(s);
    }

    /* Background floating eggs */
    var eggsWrap = document.getElementById('bgEggs');
    var eggColors = [
      ['#FFD93D','#FF6B6B'], ['#6BCB77','#4D96FF'],
      ['#C77DFF','#FF6B6B'], ['#FF6B6B','#FFD93D'],
      ['#4D96FF','#C77DFF']
    ];
    for (var j = 0; j < 14; j++) {
      var eg = document.createElement('div');
      eg.className = 'bg-egg';
      var sz = 40 + Math.random()*80;
      var colors = eggColors[j % eggColors.length];
      eg.style.cssText =
        'width:' + sz + 'px;' +
        'height:' + (sz*1.3) + 'px;' +
        'left:' + (Math.random()*100) + '%;' +
        'background: linear-gradient(135deg,' + colors[0] + ',' + colors[1] + ');' +
        'animation-duration:' + (10+Math.random()*18) + 's;' +
        'animation-delay:-' + (Math.random()*18) + 's;';
      eggsWrap.appendChild(eg);
    }

    /* Progress dots */
    var progressEl = document.getElementById('progress');
    for (var k = 1; k <= 5; k++) {
      var d = document.createElement('div');
      d.className = 'dot' + (k < 5 ? ' filled' : ' current');
      progressEl.appendChild(d);
    }

    /* Confetti burst — always fires from egg centre, never from cursor */
    var confColors = ['#FFD93D','#FF6B6B','#6BCB77','#4D96FF','#C77DFF','#FF9F43','#FFF8F0'];
    function burst(cx, cy, count) {
      for (var i = 0; i < count; i++) {
        var p = document.createElement('div');
        p.className = 'confetti-piece';
        var angle = Math.random()*360;
        var dist  = 80 + Math.random()*320;
        var rad   = angle * Math.PI / 180;
        p.style.left   = cx + 'px';
        p.style.top    = cy + 'px';
        p.style.background = confColors[Math.floor(Math.random()*confColors.length)];
        p.style.width  = (6+Math.random()*10) + 'px';
        p.style.height = (6+Math.random()*10) + 'px';
        p.style.borderRadius = Math.random() > .5 ? '50%' : '3px';
        p.animate([
          { opacity:1, transform:'translate(0,0) rotate(0deg)' },
          { opacity:1, transform:'translate(' + (Math.cos(rad)*dist) + 'px,' + (Math.sin(rad)*dist*.5-200) + 'px) rotate(' + (Math.random()*720) + 'deg)' },
          { opacity:0, transform:'translate(' + (Math.cos(rad)*dist*1.2) + 'px,' + (Math.sin(rad)*dist+300) + 'px) rotate(' + (Math.random()*1440) + 'deg)' }
        ], { duration: 1800 + Math.random()*1000, easing:'cubic-bezier(.2,.8,.4,1)', fill:'forwards' });
        document.body.appendChild(p);
        (function(el){ setTimeout(function(){ el.remove(); }, 3000); })(p);
      }
    }

    function eggCentre() {
      var r = document.getElementById('bigEgg').getBoundingClientRect();
      return { x: r.left + r.width/2, y: r.top + r.height/2 };
    }

    /* Auto-burst on load */
    window.addEventListener('load', function() {
      setTimeout(function() {
        var c = eggCentre();
        burst(c.x, c.y, 80);
      }, 600);
    });

    /* Click egg — sparkles + burst, all from egg centre */
    document.getElementById('bigEgg').addEventListener('click', function() {
      var c = eggCentre();
      burst(c.x, c.y, 50);
      var emojis = ['✨','⭐','🌸','🌷','💫','🎉'];
      for (var i = 0; i < 8; i++) {
        var sp = document.createElement('div');
        sp.className = 'sparkle';
        var dx = (Math.random() - .5) * 180;
        var dy = -80 - Math.random() * 120;
        sp.style.left = c.x + 'px';
        sp.style.top  = c.y + 'px';
        sp.style.setProperty('--dx', dx + 'px');
        sp.style.setProperty('--dy', dy + 'px');
        sp.style.animationDelay = (i * .06) + 's';
        sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        document.body.appendChild(sp);
        (function(el){ setTimeout(function(){ el.remove(); }, 1400); })(sp);
      }
    });
  </script>
  <script data-goatcounter="https://golden-egg-hunt.goatcounter.com/count"
async src="//gc.zgo.at/count.js"></script>
</body>
</html>
