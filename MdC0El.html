<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Key</title>

<style>
:root {
  --gold: #f6c445;
  --gold-soft: #ffd86b;
  --dark: #0f1226;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.15);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: radial-gradient(circle at top, #1c1f45, #0b0d1f);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* subtle stars */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.15;
}

/* floating glow blobs */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
  filter: blur(80px);
  animation: float 10s ease-in-out infinite alternate;
}

.glow:nth-child(1) { top: -100px; left: -100px; }
.glow:nth-child(2) { bottom: -100px; right: -100px; animation-delay: 2s; }

@keyframes float {
  from { transform: translate(0,0); }
  to { transform: translate(60px,40px); }
}

/* card */
.card {
  position: relative;
  width: min(600px, 90%);
  padding: 40px 30px;
  border-radius: 24px;
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

/* header */
.header {
  font-size: 0.9rem;
  letter-spacing: 3px;
  color: var(--gold-soft);
  margin-bottom: 12px;
}

h1 {
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  margin: 0 0 12px;
}

h1 span {
  color: var(--gold);
}

.subtitle {
  opacity: 0.8;
  margin-bottom: 30px;
}

/* egg */
.egg {
  width: 120px;
  height: 160px;
  margin: 0 auto 25px;
  border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
  background: linear-gradient(145deg, #ff9a9e, #fad0c4, #fbc2eb);
  box-shadow: 0 0 40px rgba(255,200,200,0.4);
  animation: floatEgg 3s ease-in-out infinite;
}

@keyframes floatEgg {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* key box */
.key-box {
  margin-top: 20px;
  padding: 25px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.03);
}

.key-label {
  font-size: 0.8rem;
  letter-spacing: 2px;
  opacity: 0.6;
  margin-bottom: 10px;
}

.key-text {
  font-size: clamp(2.5rem, 5vw, 3.5rem);
  font-weight: 900;
  letter-spacing: 5px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.footer {
  margin-top: 20px;
  font-size: 0.9rem;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="card">

  <div class="header">EASTER EGG HUNT 2025</div>

  <h1>You Found the <span>Final Key</span></h1>

  <p class="subtitle">
    You've collected all 5 clues. Here's your final word:
  </p>

  <div class="egg"></div>

  <div class="key-box">
    <div class="key-label">KEY 5 OF 5</div>
    <div class="key-text">SUNSHINE</div>
  </div>

  <div class="footer">
    Enter this word on the final page to complete the hunt 🐣
  </div>

</div>

</body>
</html>
