<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Key</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0c0f2a, #050714);
  color: white;
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* stars */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 35px 35px;
  opacity: 0.15;
}

/* container */
.card {
  text-align: center;
  width: min(600px, 90%);
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
}

/* header */
.header {
  letter-spacing: 3px;
  color: gold;
  font-size: 0.8rem;
  margin-bottom: 10px;
}

h1 {
  margin: 0;
  font-size: 2.8rem;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 30px;
}

/* egg */
.egg {
  width: 120px;
  height: 160px;
  margin: 30px auto;
  border-radius: 50% 50% 45% 45%;
  background: linear-gradient(145deg, #ff9a9e, #fad0c4, #fbc2eb);
  position: relative;
  box-shadow: 0 0 30px rgba(255,200,200,0.3);
  animation: pulseGlow 2s infinite;
}

/* crack lines */
.crack {
  position: absolute;
  width: 100%;
  height: 2px;
  background: white;
  top: 50%;
  opacity: 0;
}

/* split animation */
.split-top, .split-bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  background: inherit;
  border-radius: inherit;
  transition: transform 1s ease;
}

.split-top {
  top: 0;
}

.split-bottom {
  bottom: 0;
}

/* reveal */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.word {
  font-size: 3.2rem;
  font-weight: 900;
  color: gold;
  text-shadow: 0 0 20px rgba(255,215,0,0.8);
}

/* animations */
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 20px rgba(255,200,200,0.2); }
  50% { box-shadow: 0 0 60px rgba(255,200,200,0.8); }
}
</style>
</head>

<body>

<div class="card">
  <div class="header">FINAL DISCOVERY</div>
  <h1>You Found the Final Key</h1>
  <p class="subtitle">Something is happening...</p>

  <div class="egg" id="egg">
    <div class="split-top" id="top"></div>
    <div class="split-bottom" id="bottom"></div>
  </div>

  <div class="reveal" id="reveal">
    <p>KEY 5 OF 5</p>
    <div class="word">SUNSHINE</div>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("top").style.transform = "translateY(-80px) rotate(-10deg)";
  document.getElementById("bottom").style.transform = "translateY(80px) rotate(10deg)";
}, 1200);

setTimeout(() => {
  document.getElementById("reveal").style.opacity = 1;
  document.getElementById("reveal").style.transform = "translateY(0)";
}, 2000);

/* confetti */
const colors = ["gold","#ff6b6b","#6bcB77","#4d96ff"];
for (let i = 0; i < 60; i++) {
  const c = document.createElement("div");
  c.style.position = "fixed";
  c.style.width = "6px";
  c.style.height = "6px";
  c.style.background = colors[Math.floor(Math.random()*colors.length)];
  c.style.top = "-10px";
  c.style.left = Math.random()*100+"vw";
  c.style.opacity = "0.8";
  c.style.animation = `fall ${3+Math.random()*2}s linear infinite`;
  document.body.appendChild(c);
}

const style = document.createElement("style");
style.innerHTML = `
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
