<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock the Golden Egg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; background: #080400; }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #canvas { position: fixed; inset: 0; z-index: 0; }

  .vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 70% 65% at 50% 50%,
      transparent 25%, rgba(4,2,0,0.5) 65%, rgba(4,2,0,0.92) 100%);
  }

  /* ── MAIN STAGE ── */
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    padding: 24px; max-width: 520px; width: 100%;
    animation: fadeUp 1.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── EGG ── */
  .egg-container {
    position: relative; width: 140px; height: 140px; margin-bottom: 20px;
    cursor: pointer;
  }
  .egg-halo {
    position: absolute; inset: -32px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,210,50,0.28) 0%, transparent 68%);
    animation: halopulse 3s ease-in-out infinite;
  }
  @keyframes halopulse {
    0%,100% { transform: scale(0.9); opacity: 0.6; }
    50%      { transform: scale(1.15); opacity: 1; }
  }
  .egg-emoji {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 92px;
    filter: drop-shadow(0 0 14px rgba(255,210,40,0.9)) drop-shadow(0 0 45px rgba(245,160,20,0.5));
    animation: eggsway 5s ease-in-out infinite;
    transition: transform 0.3s ease, filter 0.3s ease;
  }
  @keyframes eggsway {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-12px) rotate(2deg); }
  }
  .egg-container:hover .egg-emoji {
    filter: drop-shadow(0 0 22px rgba(255,215,40,1)) drop-shadow(0 0 65px rgba(245,160,20,0.75));
  }

  /* ── HEADING ── */
  .eyebrow {
    font-size: 10px; font-weight: 500; letter-spacing: 0.38em;
    text-transform: uppercase; color: rgba(255,200,70,0.6);
    margin-bottom: 12px; animation: fadeUp 1.6s 0.1s both;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900; font-size: clamp(38px, 8vw, 68px);
    line-height: 0.95; letter-spacing: -0.02em;
    background: linear-gradient(155deg, #fff5b0 0%, #ffe55a 28%, #f5a520 62%, #c07000 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 28px; animation: fadeUp 1.6s 0.15s both;
  }
  h1 em { display: block; font-style: italic; }

  /* ── INPUT GRID ── */
  .inputs-wrap {
    width: 100%; margin-bottom: 22px;
    animation: fadeUp 1.6s 0.25s both;
   <input class="word-input" id="playerName" placeholder="Your Name" maxlength="40" autocomplete="off" spellcheck="false" style="margin-bottom:10px;">
  }
  .inputs-label {
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,200,70,0.5); margin-bottom: 14px;
  }
  .inputs-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .word-input {
    width: 100%; padding: 12px 6px; border-radius: 6px;
    border: 1px solid rgba(255,200,60,0.22);
    background: rgba(255,180,30,0.07);
    color: #ffe97a; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
    text-align: center; text-transform: uppercase;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    caret-color: #ffe97a;
  }
  .word-input::placeholder { color: rgba(255,200,80,0.25); font-weight: 300; text-transform: none; }
  .word-input:focus {
    border-color: rgba(255,210,70,0.55);
    background: rgba(255,180,30,0.13);
    box-shadow: 0 0 0 3px rgba(255,200,50,0.1);
  }
  .word-input.correct {
    border-color: rgba(100,255,120,0.6);
    background: rgba(80,220,100,0.1);
    color: #a0ffb0;
    box-shadow: 0 0 0 3px rgba(80,220,100,0.12);
  }

  /* ── UNLOCK BUTTON ── */
  .btn-wrap { animation: fadeUp 1.6s 0.35s both; }
  .btn {
    position: relative; display: inline-flex; align-items: center; gap: 12px;
    padding: 18px 44px; border-radius: 6px; border: none; cursor: pointer;
    overflow: hidden; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: 0.07em; color: #160900;
    background: linear-gradient(130deg, #ffee88 0%, #f5c118 42%, #e8820c 100%);
    box-shadow:
      0 0 0 1px rgba(255,195,40,0.18),
      0 6px 28px rgba(245,193,24,0.42),
      0 18px 60px rgba(200,110,0,0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    transform: translateX(-120%);
    animation: shimmer 4s 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-120%)} 100%{transform:translateX(220%)} }
  .btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow:
      0 0 0 1px rgba(255,195,40,0.28),
      0 10px 44px rgba(245,193,24,0.55),
      0 24px 80px rgba(200,110,0,0.35);
  }
  .btn:active { transform: translateY(-1px); }
  .btn span, .btn-icon { position: relative; z-index: 1; }
  .btn-icon { font-size: 18px; }

  /* ── ERROR shake ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake 0.45s ease; }

  /* ── VICTORY OVERLAY ── */
  #victory {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(50,22,0,0.97) 0%, rgba(8,4,0,0.99) 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  #victory.visible { opacity: 1; pointer-events: all; }

  .victory-egg {
    font-size: 120px;
    filter: drop-shadow(0 0 30px rgba(255,215,40,1)) drop-shadow(0 0 80px rgba(245,160,20,0.7));
    animation: victoryBounce 1.2s cubic-bezier(0.36,0.07,0.19,0.97) both,
               victoryFloat 3s 1.2s ease-in-out infinite;
    margin-bottom: 24px;
  }
  @keyframes victoryBounce {
    0%  { transform: scale(0) rotate(-15deg); opacity: 0; }
    60% { transform: scale(1.25) rotate(5deg); opacity: 1; }
    80% { transform: scale(0.9) rotate(-3deg); }
    100%{ transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes victoryFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }

  .victory-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900; font-size: clamp(36px, 8vw, 72px);
    line-height: 0.95; letter-spacing: -0.02em;
    background: linear-gradient(155deg, #fff5b0 0%, #ffe55a 30%, #f5a520 65%, #c07000 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 12px;
    animation: fadeUp 0.8s 0.5s both;
  }
  .victory-title em { display: block; font-style: italic; }

  .victory-sub {
    font-size: 16px; font-weight: 300; color: rgba(255,235,160,0.65);
    margin-bottom: 32px; line-height: 1.6;
    animation: fadeUp 0.8s 0.7s both;
  }
  .victory-sub strong { color: #ffe97a; font-weight: 500; font-style: italic; }

  .screenshot-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 36px; border-radius: 6px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: 0.08em; color: #160900;
    background: linear-gradient(130deg, #ffee88 0%, #f5c118 42%, #e8820c 100%);
    box-shadow: 0 6px 30px rgba(245,193,24,0.45), 0 18px 60px rgba(200,110,0,0.3);
    animation: fadeUp 0.8s 0.9s both;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .screenshot-btn:hover { transform: translateY(-3px) scale(1.02); }
  .screenshot-btn:active { transform: translateY(0); }

  /* ── CONFETTI & FIREWORKS ── */
  .confetti-piece {
    position: fixed; width: 9px; height: 9px; top: -12px;
    border-radius: 2px; pointer-events: none; z-index: 200;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(900deg); opacity: 0; }
  }

  .firework-dot {
    position: fixed; width: 7px; height: 7px;
    border-radius: 50%; pointer-events: none; z-index: 199;
  }

  /* ── SECRET tap counter ── */
  #secret-msg {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: rgba(255,200,70,0.7);
    z-index: 20; opacity: 0; transition: opacity 0.4s;
    pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="vignette"></div>

<!-- ── INPUT STAGE ── -->
<div class="stage" id="inputStage">
  <div class="egg-container" onclick="secretTap()">
    <div class="egg-halo"></div>
    <div class="egg-emoji" id="stageEgg">🥚</div>
  </div>

  <p class="eyebrow">— Speak the Incantation —</p>
  <h1>Unlock the<em>Golden Egg</em></h1>

  <div class="inputs-wrap">
    <p class="inputs-label">Enter your 5 secret words</p>
    <div class="inputs-grid">
      <input class="word-input" id="w1" placeholder="Word 1" maxlength="20" autocomplete="off" spellcheck="false">
      <input class="word-input" id="w2" placeholder="Word 2" maxlength="20" autocomplete="off" spellcheck="false">
      <input class="word-input" id="w3" placeholder="Word 3" maxlength="20" autocomplete="off" spellcheck="false">
      <input class="word-input" id="w4" placeholder="Word 4" maxlength="20" autocomplete="off" spellcheck="false">
      <input class="word-input" id="w5" placeholder="Word 5" maxlength="20" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn" onclick="checkWords()">
      <span class="btn-icon">🔓</span>
      <span>Unlock</span>
      <div class="btn-shimmer"></div>
    </button>
  </div>
</div>

<!-- ── VICTORY SCREEN ── -->
<div id="victory">
  <div class="victory-egg" id="victoryEgg">🥚</div>
  <h2 class="victory-title">You Found<em>the Golden Egg!</em></h2>
  <p class="victory-sub">The hunt is over. The legend is real.<br><strong>Screenshot this moment to claim your prize.</strong></p>
<button class="screenshot-btn" onclick="handleWin()">
  📧 &nbsp;Claim Your Prize
</button>
</div>

<div id="secret-msg"></div>

<!-- GoatCounter -->
<script data-goatcounter="https://golden-egg-hunt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
/* ─── CONFIG ─── */
const CORRECT = ["GOLD","QUEST","HIDDEN","KEY","RISE"];

/* ─── PARTICLE ENGINE (unchanged) ─── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
const mouse = { x: -9999, y: -9999 };

function rand(a, b) { return a + Math.random() * (b - a); }

class Spark {
  constructor(full) { this.init(full); }
  init(full) {
    this.x = rand(0, W); this.y = full ? rand(0, H) : H + 8;
    this.vx = rand(-0.18, 0.18); this.vy = rand(-0.5, -0.08);
    this.r = rand(0.8, 3.2); this.baseAlpha = rand(0.12, 0.82);
    this.phase = rand(0, Math.PI * 2); this.freq = rand(0.006, 0.02);
    this.hue = rand(36, 54);
  }
  update() {
    this.phase += this.freq;
    this.x += this.vx + Math.sin(this.phase * 0.6) * 0.14;
    this.y += this.vy;
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const d = Math.hypot(dx, dy);
    if (d < 120 && d > 0) { const f = ((120-d)/120)*0.7; this.x += dx/d*f; this.y += dy/d*f; }
    if (this.y < -10) this.init(false);
  }
  draw() {
    const a = this.baseAlpha * (0.55 + 0.45 * Math.sin(this.phase));
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue},100%,72%,${a})`; ctx.fill();
  }
}

class Orb {
  constructor() { this.init(); }
  init() {
    this.x = rand(0, W); this.y = rand(0, H);
    this.r = rand(80, 240); this.vx = rand(-0.07, 0.07); this.vy = rand(-0.06, 0.06);
    this.a = rand(0.04, 0.1); this.hue = rand(36, 52);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < -this.r*2) this.x = W+this.r;
    if (this.x > W+this.r*2) this.x = -this.r;
    if (this.y < -this.r*2) this.y = H+this.r;
    if (this.y > H+this.r*2) this.y = -this.r;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0, `hsla(${this.hue},100%,58%,${this.a})`);
    g.addColorStop(1, `hsla(${this.hue},80%,38%,0)`);
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  }
}

let sparks, orbs;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initParticles() { resize(); sparks = Array.from({length:140}, (_,i) => new Spark(i < 100)); orbs = Array.from({length:7}, () => new Orb()); }

function loop() {
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.85);
  bg.addColorStop(0,'rgba(46,20,0,1)');
  bg.addColorStop(0.45,'rgba(20,8,0,1)');
  bg.addColorStop(1,'rgba(5,2,0,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);
  orbs.forEach(o => { o.update(); o.draw(); });
  sparks.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(loop);
}

window.addEventListener('resize', initParticles);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive:true});
initParticles(); loop();

/* ─── INPUT LOGIC ─── */
function getValues() {
  return [1,2,3,4,5].map(i => document.getElementById('w'+i).value.toUpperCase().trim());
}

function checkWords() {
  const vals = getValues();
  const matched = CORRECT.every(w => vals.includes(w));

  if (matched) {
    [1,2,3,4,5].forEach(i => {
      const el = document.getElementById('w'+i);
      if (CORRECT.includes(el.value.toUpperCase().trim())) el.classList.add('correct');
    });
    setTimeout(openVictory, 600);
  } else {
    const btn = document.querySelector('.btn');
    const grid = document.querySelector('.inputs-grid');
    btn.classList.remove('shake'); grid.classList.remove('shake');
    requestAnimationFrame(() => {
      btn.classList.add('shake'); grid.classList.add('shake');
    });
    setTimeout(() => { btn.classList.remove('shake'); grid.classList.remove('shake'); }, 500);
  }
}

document.querySelectorAll('.word-input').forEach((el, i, arr) => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (i < arr.length - 1) arr[i+1].focus();
      else checkWords();
    }
  });
});

/* ─── VICTORY ─── */
function openVictory() {
  document.getElementById('victory').classList.add('visible');
  launchConfetti(120);
  setTimeout(() => { for (let f = 0; f < 5; f++) setTimeout(createFirework, f * 180); }, 400);
}

let celebrationUsed = false;
function triggerCelebration() {
  if (celebrationUsed) { wiggleEgg(); return; }
  celebrationUsed = true;

  const egg = document.getElementById('victoryEgg');

  egg.style.transition = 'none';
  egg.animate([
    { transform: 'scale(1) rotate(0deg)' },
    { transform: 'scale(1.15) rotate(-8deg)' },
    { transform: 'scale(1.15) rotate(8deg)' },
    { transform: 'scale(1) rotate(0deg)' }
  ], { duration: 350 });

  setTimeout(() => {
    egg.textContent = '🐣';
    for (let f = 0; f < 6; f++) setTimeout(createFirework, f * 160);
    launchConfetti(200);
  }, 350);
}

function wiggleEgg() {
  document.getElementById('victoryEgg').animate([
    { transform:'scale(1) rotate(0deg)' },
    { transform:'scale(1.1) rotate(-6deg)' },
    { transform:'scale(1.1) rotate(6deg)' },
    { transform:'scale(1) rotate(0deg)' }
  ], { duration: 300 });
}

/* ─── CONFETTI ─── */
const CONFETTI_COLORS = ['#ffe566','#f5a520','#ff4081','#4caf50','#2196f3','#e040fb','#ff6b35','#fff'];
function launchConfetti(n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      c.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 12);
  }
}

/* ─── FIREWORKS ─── */
function createFirework() {
  const x = rand(W * 0.15, W * 0.85);
  const y = rand(H * 0.05, H * 0.55);
  for (let i = 0; i < 28; i++) {
    const dot = document.createElement('div');
    dot.className = 'firework-dot';
    dot.style.cssText = `left:${x}px;top:${y}px;background:#ffd700;`;
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 1100);
  }
}

/* ─── NEW: WIN HANDLER ─── */
function generateWinnerID() {
  return 'EGG-' + Math.random().toString(36).substring(2, 8).toUpperCase();
}

function handleWin() {
  triggerCelebration();
  setTimeout(submitResult, 1200);
}

function submitResult() {
  let name = document.getElementById('playerName')?.value.trim();
  if (!name) name = prompt("Enter your name:");
  if (!name) return;

  const words = getValues().join(', ');
  const winnerID = generateWinnerID();

  fetch("https://script.google.com/macros/s/AKfycbzEXu7BiQGJgV7crnXOhDhVw5v79ZsB0jo2FQVRrXAkcZNFjHRAimNtxC2XVgl7MuoQfg/exec", {
    method: "POST",
    body: JSON.stringify({ name, words, id: winnerID }),
    headers: { "Content-Type": "application/json" }
  });

  const subject = encodeURIComponent("🏆 Golden Egg Hunt Winner");
  const body = encodeURIComponent(
`Name: ${name}
Winner ID: ${winnerID}
Words: ${words}`
  );

  window.location.href = `mailto:duguayj@ndh.on.ca?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
