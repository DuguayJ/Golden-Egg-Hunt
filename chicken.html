<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🐔 CHICKEN TAKEOVER</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:   #FFD700;
      --orange: #FF6B2B;
      --dark:   #2A1200;
      --barn:   #8B2010;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      position: fixed;
      touch-action: none;
      font-family: 'Nunito', sans-serif;
      cursor: crosshair;
    }

    /* ══════════════════════════
       SCENE LAYERS
    ══════════════════════════ */

    /* Sky */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(to bottom,
        #87CEEB 0%,
        #B0DEFF 45%,
        #FFE4A0 75%,
        #FFC46B 100%
      );
    }

    /* Sun */
    .sun {
      position: fixed;
      top: 8%; right: 12%;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, #FFE566 40%, #FFC200 100%);
      box-shadow: 0 0 0 14px rgba(255,220,80,.18), 0 0 0 28px rgba(255,200,60,.09);
      z-index: 1;
      animation: sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 0 14px rgba(255,220,80,.18), 0 0 0 28px rgba(255,200,60,.09); }
      50%      { box-shadow: 0 0 0 20px rgba(255,220,80,.22), 0 0 0 40px rgba(255,200,60,.11); }
    }

    /* Clouds */
    .cloud {
      position: fixed;
      z-index: 2;
      animation: cloudDrift linear infinite;
      pointer-events: none;
    }
    .cloud-body {
      position: relative;
      background: white;
      border-radius: 50px;
      opacity: .88;
    }
    .cloud-body::before, .cloud-body::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud-1 .cloud-body { width: 110px; height: 36px; top: 0; left: 0; }
    .cloud-1 .cloud-body::before { width: 56px; height: 56px; top: -28px; left: 16px; }
    .cloud-1 .cloud-body::after  { width: 40px; height: 40px; top: -20px; left: 54px; }
    .cloud-2 .cloud-body { width: 80px; height: 28px; top: 0; left: 0; }
    .cloud-2 .cloud-body::before { width: 42px; height: 42px; top: -22px; left: 10px; }
    .cloud-2 .cloud-body::after  { width: 30px; height: 30px; top: -14px; left: 40px; }
    @keyframes cloudDrift {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-220px); }
    }

    /* Far hills */
    .hills-far {
      position: fixed;
      bottom: 30%; left: 0; right: 0;
      height: 160px;
      z-index: 3;
      pointer-events: none;
    }

    /* Barn */
    .barn-wrap {
      position: fixed;
      z-index: 5;
      pointer-events: none;
    }

    /* Grass ground */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 32%;
      z-index: 4;
      background: linear-gradient(to bottom, #5DBF3C 0%, #3D9420 60%, #2A6A14 100%);
    }

    /* Grass blades top edge */
    .grass-top {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      bottom: 30%;
      left: 0; right: 0;
      height: 28px;
    }

    /* Hay bales */
    .hay {
      position: fixed;
      z-index: 7;
      pointer-events: none;
      font-size: 2.2rem;
      bottom: 26%;
    }

    /* Fence */
    .fence {
      position: fixed;
      bottom: 25%;
      left: 0; right: 0;
      z-index: 8;
      pointer-events: none;
      display: flex;
      gap: 0;
    }
    .fence-post {
      width: 14px;
      height: 38px;
      background: linear-gradient(to bottom, #C8A060, #8B6030);
      border-radius: 3px 3px 0 0;
      flex-shrink: 0;
    }
    .fence-rail-wrap {
      position: fixed;
      bottom: 25%;
      left: 0; right: 0;
      z-index: 8;
      pointer-events: none;
    }
    .fence-rail {
      position: absolute;
      left: 0; right: 0;
      height: 7px;
      background: linear-gradient(to bottom, #D4AA70, #9B7040);
      border-radius: 4px;
    }
    .fence-rail.top    { bottom: 28px; }
    .fence-rail.bottom { bottom: 12px; }

    /* Flowers */
    .flower {
      position: fixed;
      z-index: 9;
      pointer-events: none;
      font-size: 1.1rem;
    }

    /* ══════════════════════════
       UI BANNER
    ══════════════════════════ */
    .ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #8B2010 0%, #C0392B 40%, #8B2010 100%);
      background-size: 200% 100%;
      animation: bannerShift 4s linear infinite;
      padding: 10px 16px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 4px solid var(--gold);
    }
    @keyframes bannerShift {
      0%,100% { background-position: 0%; }
      50%      { background-position: 100%; }
    }

    .banner-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1rem, 4vw, 1.55rem);
      color: var(--gold);
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(0,0,0,.4);
    }
    .banner-sub {
      font-size: clamp(.58rem, 1.8vw, .72rem);
      color: rgba(255,220,120,.85);
      font-weight: 700;
      margin-top: 3px;
    }
    .banner-stats {
      text-align: center;
      background: rgba(0,0,0,.25);
      border-radius: 12px;
      padding: 6px 14px;
      border: 1px solid rgba(255,215,0,.3);
    }
    .stat-number {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: white;
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(0,0,0,.4);
    }
    .stat-label {
      font-size: .52rem;
      color: rgba(255,255,255,.75);
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .banner-btn {
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 12px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(.62rem, 2.5vw, .78rem);
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
      transition: transform .1s, box-shadow .1s;
      white-space: nowrap;
    }
    .banner-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }

    /* ══════════════════════════
       TOASTS
    ══════════════════════════ */
    .toast-wrap {
      position: fixed;
      top: 84px; left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      pointer-events: none;
    }
    .toast {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.95rem, 3.5vw, 1.3rem);
      padding: 10px 22px;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      animation: toastPop .45s cubic-bezier(.34,1.56,.64,1) both,
                 toastFade .4s 2.6s ease forwards;
      white-space: nowrap;
    }
    .toast.gold    { background: linear-gradient(135deg,#FFD700,#FFA500); color:#3a2000; }
    .toast.rainbow { background: linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c77dff); color:white; text-shadow:1px 1px 0 rgba(0,0,0,.3); }
    .toast.pop     { background:white; color:var(--dark); font-size:.88rem; padding:8px 18px; }
    @keyframes toastPop  { from{opacity:0;transform:scale(.5)translateY(8px);}to{opacity:1;transform:scale(1)translateY(0);} }
    @keyframes toastFade { from{opacity:1;}to{opacity:0;transform:translateY(-16px);} }

    /* ══════════════════════════
       CHICKENS
    ══════════════════════════ */
    .chicken {
      position: fixed;
      font-size: 38px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      z-index: 50;
      line-height: 1;
      transition: left 2.8s cubic-bezier(.45,0,.55,1), top 2.8s cubic-bezier(.45,0,.55,1);
      animation: waddle .5s ease-in-out infinite alternate;
      transform-origin: bottom center;
      will-change: transform;
      filter: drop-shadow(2px 4px 3px rgba(0,0,0,.25));
    }
    @keyframes waddle {
      from { transform: rotate(-6deg) scaleX(1); }
      to   { transform: rotate(6deg)  scaleX(-1); }
    }
    .chicken.gold {
      font-size: 52px; z-index: 60;
      animation: waddleG .48s ease-in-out infinite alternate, goldGlow 1.2s ease-in-out infinite;
    }
    @keyframes waddleG {
      from{transform:rotate(-7deg) scaleX(1);}
      to  {transform:rotate(7deg)  scaleX(-1);}
    }
    @keyframes goldGlow {
      0%,100%{filter:drop-shadow(0 0 8px gold) drop-shadow(2px 4px 3px rgba(0,0,0,.25));}
      50%    {filter:drop-shadow(0 0 22px gold) drop-shadow(2px 4px 3px rgba(0,0,0,.25));}
    }
    .chicken.rainbow {
      font-size: 62px; z-index: 70;
      animation: waddleR .38s ease-in-out infinite alternate, rainbowGlow 1s linear infinite;
    }
    @keyframes waddleR {
      from{transform:rotate(-10deg) scaleX(1);}
      to  {transform:rotate(10deg)  scaleX(-1);}
    }
    @keyframes rainbowGlow {
      0%  {filter:hue-rotate(0deg)   drop-shadow(0 0 14px white);}
      100%{filter:hue-rotate(360deg) drop-shadow(0 0 28px white);}
    }
    .egg-pending {
      position: fixed; font-size: 34px; z-index: 49;
      pointer-events: none;
      animation: eggRock .55s ease-in-out infinite alternate;
      filter: drop-shadow(2px 4px 3px rgba(0,0,0,.2));
    }
    @keyframes eggRock { from{transform:rotate(-8deg);}to{transform:rotate(8deg);} }

    .chicken.popping {
      animation: chickenPop .3s ease-out forwards !important;
      pointer-events: none;
    }
    @keyframes chickenPop {
      0%  {transform:scale(1)  rotate(0deg);  opacity:1;}
      60% {transform:scale(1.7)rotate(22deg); opacity:.8;}
      100%{transform:scale(0)  rotate(-30deg);opacity:0;}
    }

    /* Feathers */
    .feather {
      position: fixed; font-size: 15px;
      pointer-events: none; z-index: 9997;
      animation: featherFly var(--fdur) ease-out forwards;
    }
    @keyframes featherFly {
      0%  {opacity:1;transform:translate(0,0)rotate(0deg) scale(1);}
      100%{opacity:0;transform:translate(var(--fx),var(--fy))rotate(var(--fr)) scale(.3);}
    }

    /* Screen shake for rainbow */
    @keyframes screenShake {
      0%,100%{transform:translate(0,0)rotate(0deg);}
      10%{transform:translate(-8px,-4px)rotate(-1deg);}
      20%{transform:translate(8px,4px)rotate(1deg);}
      30%{transform:translate(-6px,6px)rotate(-.5deg);}
      40%{transform:translate(6px,-6px)rotate(.5deg);}
      50%{transform:translate(-4px,4px);}
      60%{transform:translate(4px,-4px);}
      70%{transform:translate(-2px,2px);}
      80%{transform:translate(2px,-2px);}
    }
    body.shaking { animation: screenShake .6s ease both; }

    /* Intro egg */
    .intro-egg {
      position: fixed; left:50%; top:55%;
      transform:translate(-50%,-50%);
      font-size:100px; z-index:9990;
      pointer-events:none;
      filter:drop-shadow(0 8px 24px rgba(0,0,0,.3));
    }
  </style>
</head>
<body>

  <!-- ── SCENE ── -->
  <div class="sky"></div>
  <div class="sun"></div>

  <!-- Clouds -->
  <div class="cloud cloud-1" style="top:9%;animation-duration:55s;animation-delay:-10s"><div class="cloud-body"></div></div>
  <div class="cloud cloud-2" style="top:16%;animation-duration:75s;animation-delay:-32s"><div class="cloud-body"></div></div>
  <div class="cloud cloud-1" style="top:6%;animation-duration:90s;animation-delay:-60s"><div class="cloud-body"></div></div>

  <!-- Far rolling hills (SVG) -->
  <div class="hills-far">
    <svg viewBox="0 0 1440 160" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,140 C120,60 260,140 440,80 C600,30 760,110 960,60 C1100,20 1280,90 1440,60 L1440,160 L0,160Z" fill="#6DC947" opacity=".6"/>
      <path d="M0,155 C180,90 360,155 560,100 C720,58 880,130 1100,80 C1240,48 1360,110 1440,85 L1440,160 L0,160Z" fill="#4DA830"/>
    </svg>
  </div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Barn (SVG) -->
  <div class="barn-wrap" style="left:50%;transform:translateX(-50%);bottom:28%;width:min(320px,40vw);">
    <svg viewBox="0 0 320 260" width="100%" xmlns="http://www.w3.org/2000/svg">
      <!-- Main body -->
      <rect x="20" y="110" width="280" height="150" fill="#8B2010"/>
      <!-- Roof -->
      <polygon points="0,120 160,10 320,120" fill="#6A1408"/>
      <!-- Roof ridge cap -->
      <polygon points="0,120 160,10 320,120 300,112 160,22 20,112" fill="#5A1006"/>
      <!-- Loft window -->
      <polygon points="130,58 160,38 190,58" fill="#FFD07A"/>
      <rect x="132" y="58" width="56" height="36" rx="2" fill="#FFD07A"/>
      <rect x="145" y="62" width="4" height="28" fill="#8B2010" opacity=".5"/>
      <rect x="132" y="75" width="56" height="4" fill="#8B2010" opacity=".5"/>
      <!-- Door frame -->
      <rect x="110" y="160" width="100" height="100" rx="4" fill="#5A1006"/>
      <!-- Door panels -->
      <rect x="114" y="164" width="44" height="96" rx="2" fill="#7A1C0A"/>
      <rect x="162" y="164" width="44" height="96" rx="2" fill="#7A1C0A"/>
      <!-- Door arch -->
      <path d="M110,200 Q160,155 210,200" fill="#5A1006"/>
      <!-- Door handles -->
      <circle cx="154" cy="210" r="4" fill="#FFD700"/>
      <circle cx="166" cy="210" r="4" fill="#FFD700"/>
      <!-- Left window -->
      <rect x="30" y="145" width="58" height="46" rx="3" fill="#FFD07A"/>
      <rect x="57" y="148" width="4" height="40" fill="#8B2010" opacity=".5"/>
      <rect x="32" y="168" width="54" height="4" fill="#8B2010" opacity=".5"/>
      <!-- Right window -->
      <rect x="232" y="145" width="58" height="46" rx="3" fill="#FFD07A"/>
      <rect x="259" y="148" width="4" height="40" fill="#8B2010" opacity=".5"/>
      <rect x="234" y="168" width="54" height="4" fill="#8B2010" opacity=".5"/>
      <!-- White trim board -->
      <rect x="18" y="108" width="284" height="8" fill="#F5E6C8"/>
      <!-- Vertical wood planks -->
      <line x1="80"  y1="116" x2="80"  y2="260" stroke="#6A1408" stroke-width="2" opacity=".35"/>
      <line x1="140" y1="116" x2="140" y2="160" stroke="#6A1408" stroke-width="2" opacity=".35"/>
      <line x1="180" y1="116" x2="180" y2="160" stroke="#6A1408" stroke-width="2" opacity=".35"/>
      <line x1="240" y1="116" x2="240" y2="260" stroke="#6A1408" stroke-width="2" opacity=".35"/>
      <!-- Weathervane -->
      <line x1="160" y1="10" x2="160" y2="-14" stroke="#C8A060" stroke-width="3" stroke-linecap="round"/>
      <polygon points="148,-22 172,-22 160,-10" fill="#C8A060"/>
      <circle cx="160" cy="-12" r="4" fill="#FFD700"/>
    </svg>
  </div>

  <!-- Silo -->
  <div class="barn-wrap" style="right:calc(50% - min(200px,26vw));bottom:28%;width:min(70px,9vw);">
    <svg viewBox="0 0 70 200" width="100%" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="35" cy="22" rx="35" ry="12" fill="#A0A0A0"/>
      <rect x="0" y="22" width="70" height="178" fill="#BEBEBE"/>
      <!-- hoops -->
      <ellipse cx="35" cy="50"  rx="35" ry="6" fill="none" stroke="#9A9A9A" stroke-width="3"/>
      <ellipse cx="35" cy="90"  rx="35" ry="6" fill="none" stroke="#9A9A9A" stroke-width="3"/>
      <ellipse cx="35" cy="130" rx="35" ry="6" fill="none" stroke="#9A9A9A" stroke-width="3"/>
      <ellipse cx="35" cy="170" rx="35" ry="6" fill="none" stroke="#9A9A9A" stroke-width="3"/>
      <!-- cone top -->
      <polygon points="0,22 35,0 70,22" fill="#888"/>
    </svg>
  </div>

  <!-- Hay bales -->
  <div class="hay" style="left:6%;bottom:27%;">🌾</div>
  <div class="hay" style="left:10%;bottom:27%;">🌾</div>
  <div class="hay" style="right:8%;bottom:27%;">🌾</div>

  <!-- Grass blades SVG strip -->
  <div class="grass-top">
    <svg viewBox="0 0 1440 28" preserveAspectRatio="none" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,28 C30,10 50,24 70,8 C90,0 110,20 140,6 C160,-2 180,18 210,4 C230,-4 250,22 280,8 C300,0 320,20 360,6 C380,-2 400,18 440,5 C460,-3 490,22 520,7 C545,0 570,20 600,6 C622,-2 650,18 680,4 C700,-4 730,22 760,8 C784,0 810,20 840,5 C862,-3 890,22 920,7 C944,0 970,20 1000,6 C1022,-2 1050,18 1080,4 C1100,-4 1130,22 1160,8 C1184,0 1210,20 1240,5 C1262,-3 1290,22 1320,7 C1344,0 1370,20 1400,6 C1420,-2 1435,18 1440,12 L1440,28Z" fill="#5DBF3C"/>
    </svg>
  </div>

  <!-- Fence posts & rails -->
  <div class="fence" id="fenceRow" style="padding:0 0 0 0;"></div>
  <div class="fence-rail-wrap">
    <div class="fence-rail top"></div>
    <div class="fence-rail bottom"></div>
  </div>

  <!-- Flowers scattered in grass -->
  <div class="flower" style="left:4%;bottom:22%;">🌻</div>
  <div class="flower" style="left:16%;bottom:20%;">🌼</div>
  <div class="flower" style="left:28%;bottom:23%;">🌸</div>
  <div class="flower" style="right:5%;bottom:21%;">🌻</div>
  <div class="flower" style="right:18%;bottom:23%;">🌼</div>
  <div class="flower" style="right:30%;bottom:20%;">🌸</div>
  <div class="flower" style="left:44%;bottom:21%;">🌼</div>
  <div class="flower" style="right:44%;bottom:22%;">🌸</div>

  <!-- ── UI ── -->
  <div class="ui">
    <div>
      <div class="banner-title">🐔 CHICKEN TAKEOVER</div>
      <div class="banner-sub">🥚 APRIL FOOLS — Real QR codes still out there!</div>
    </div>
    <div class="banner-stats">
      <div class="stat-number" id="counter">0</div>
      <div class="stat-label">chickens</div>
    </div>
    <button class="banner-btn" onclick="location.href='index.html'">🏃 Return to Hunt</button>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script>
    var MAX = 80;
    var chickens = [], goldExists = false, rainbowExists = false, totalPopped = 0;
    var counterEl = document.getElementById('counter');

    /* ── Fence posts ── */
    (function() {
      var row = document.getElementById('fenceRow');
      var spacing = 60;
      var n = Math.ceil(window.innerWidth / spacing) + 2;
      for (var i = 0; i < n; i++) {
        var p = document.createElement('div');
        p.className = 'fence-post';
        p.style.marginLeft = i === 0 ? '-4px' : (spacing - 14) + 'px';
        row.appendChild(p);
      }
    })();

    function updateCounter() { counterEl.textContent = chickens.length; }

    /* ── Toast ── */
    function toast(msg, type) {
      var w = document.getElementById('toasts');
      var t = document.createElement('div');
      t.className = 'toast ' + (type || '');
      t.textContent = msg;
      w.appendChild(t);
      setTimeout(function(){ t.remove(); }, 3200);
    }

    /* ── Safe position — mostly in the lower 2/3, above grass ── */
    function safePos() {
      return {
        x: 8 + Math.random() * (window.innerWidth - 80),
        y: 80 + Math.random() * (window.innerHeight * .55)
      };
    }

    /* ── Feather burst ── */
    var feathers = ['🪶','✨','⭐','💛','🌟'];
    function featherBurst(cx, cy, n) {
      for (var i = 0; i < n; i++) {
        var f = document.createElement('div');
        f.className = 'feather';
        var a = Math.random() * Math.PI * 2;
        var d = 40 + Math.random() * 110;
        f.textContent = feathers[Math.floor(Math.random() * feathers.length)];
        f.style.cssText =
          'left:'+cx+'px;top:'+cy+'px;' +
          '--fx:'+(Math.cos(a)*d)+'px;--fy:'+(Math.sin(a)*d-40)+'px;' +
          '--fr:'+(Math.random()*720-360)+'deg;' +
          '--fdur:'+(0.55+Math.random()*.5)+'s;' +
          'animation-delay:'+(i*.03)+'s;';
        document.body.appendChild(f);
        (function(el){ setTimeout(function(){el.remove();},1400); })(f);
      }
    }

    /* ── Pop normal chicken ── */
    function popChicken(c) {
      var r = c.getBoundingClientRect();
      featherBurst(r.left+r.width/2, r.top+r.height/2, 8);
      c.classList.add('popping');
      var idx = chickens.indexOf(c);
      if (idx !== -1) chickens.splice(idx, 1);
      setTimeout(function(){ c.remove(); updateCounter(); }, 320);
      totalPopped++;
      if (totalPopped % 10 === 0) toast('🪶 ' + totalPopped + ' chickens popped!', 'pop');
    }

    /* ── Elite click ── */
    function eliteClick(c, type) {
      var r = c.getBoundingClientRect();
      featherBurst(r.left+r.width/2, r.top+r.height/2, 20);
      c.classList.add('popping');
      var idx = chickens.indexOf(c);
      if (idx !== -1) chickens.splice(idx, 1);
      setTimeout(function(){ c.remove(); updateCounter(); }, 320);
      if (type === 'rainbow') {
        rainbowExists = false;
        document.body.classList.add('shaking');
        setTimeout(function(){document.body.classList.remove('shaking');},700);
        toast('🌈 LEGENDARY! You found the Rainbow Chicken!!','rainbow');
      } else {
        goldExists = false;
        toast('🥚 SECRET EGG FOUND! You are elite! 🏆','gold');
      }
    }

    /* ── Wander ── */
    function wander(c) {
      function move() {
        var p = safePos();
        c.style.left = p.x+'px';
        c.style.top  = p.y+'px';
      }
      move();
      var iv = setInterval(function(){
        if (!document.body.contains(c)){clearInterval(iv);return;}
        move();
      }, 2800 + Math.random()*1000);
    }

    /* ── Spawn ── */
    function spawnChicken() {
      if (chickens.length >= MAX) {
        var old = chickens.shift();
        if (old && old.parentNode) old.remove();
        updateCounter();
      }
      var egg = document.createElement('div');
      egg.className = 'egg-pending';
      var p = safePos();
      egg.style.left = p.x+'px';
      egg.style.top  = p.y+'px';
      egg.textContent = '🥚';
      document.body.appendChild(egg);

      setTimeout(function(){
        egg.remove();
        var rarity = 'normal';
        if (!rainbowExists && Math.random() < 0.005) { rarity='rainbow'; rainbowExists=true; }
        else if (!goldExists && Math.random() < 0.04) { rarity='gold'; goldExists=true; }

        var c = document.createElement('div');
        c.className = 'chicken' + (rarity!=='normal' ? ' '+rarity : '');
        c.textContent = '🐔';
        c.style.left = p.x+'px';
        c.style.top  = p.y+'px';
        document.body.appendChild(c);

        if (rarity === 'normal') {
          c.addEventListener('click', function(){popChicken(c);});
          c.addEventListener('touchstart', function(e){e.preventDefault();popChicken(c);},{passive:false});
        } else {
          c.addEventListener('click', function(){eliteClick(c,rarity);});
          c.addEventListener('touchstart', function(e){e.preventDefault();eliteClick(c,rarity);},{passive:false});
        }

        chickens.push(c);
        wander(c);
        updateCounter();

        if (rarity==='gold')    toast('✨ A Golden Chicken appeared! Find it!','gold');
        if (rarity==='rainbow') toast('🌈 LEGENDARY Rainbow Chicken is loose!!','rainbow');
      }, 450);
    }

    /* ── Intro ── */
    function eggExplosion() {
      var egg = document.createElement('div');
      egg.className = 'intro-egg';
      egg.textContent = '🥚';
      document.body.appendChild(egg);
      egg.animate([
        {transform:'translate(-50%,-50%) scale(1)',opacity:1},
        {transform:'translate(-50%,-50%) scale(1.6)',opacity:1},
        {transform:'translate(-50%,-50%) scale(0)',opacity:0}
      ], {duration:700, easing:'ease-in'});
      setTimeout(function(){
        egg.remove();
        for (var i = 0; i < 12; i++) {
          (function(d){setTimeout(spawnChicken,d);})(i*80);
        }
        setInterval(spawnChicken, 700);
      }, 700);
    }

    eggExplosion();
  </script>

  <script data-goatcounter="https://golden-egg-hunt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
