<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>You Found Something Special...</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1a1a2e;
  --bg2:      #16213e;
  --gold:     #f5c542;
  --gold2:    #e0a800;
  --white:    #fffdf7;
  --soft:     #c8c0d8;
  --danger:   #e05c5c;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--white);
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Starfield ── */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  animation: starPulse linear infinite;
}
@keyframes starPulse {
  0%,100% { opacity: 0; }
  50%      { opacity: 0.7; }
}

/* ── Main layout ── */
#app {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 1rem;
}

/* ── Header ── */
#header {
  text-align: center;
  margin-bottom: clamp(10px, 3vh, 24px);
}
#eyebrow {
  font-size: clamp(11px, 2.5vw, 14px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 6px;
}
#main-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(26px, 6vw, 48px);
  line-height: 1.1;
  color: var(--white);
  text-shadow: 0 0 30px rgba(245,197,66,0.4);
}
#subtitle {
  font-size: clamp(13px, 2.5vw, 16px);
  color: var(--soft);
  margin-top: 6px;
  font-style: italic;
}

/* ── Crack counter ── */
#counter-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: clamp(8px, 2vh, 18px);
  opacity: 0;
  transition: opacity 0.4s;
}
#counter-wrap.visible { opacity: 1; }
#counter-label { font-size: 13px; color: var(--soft); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
#counter-num {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(22px, 5vw, 36px);
  color: var(--gold);
  min-width: 48px;
  text-align: center;
  text-shadow: 0 0 12px rgba(245,197,66,0.5);
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
#counter-num.bump { transform: scale(1.4); }

/* ── Egg stage ── */
#egg-stage {
  position: relative;
  width: clamp(160px, 38vw, 260px);
  height: clamp(200px, 46vw, 320px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: clamp(8px, 2vh, 20px);
}

/* Glow ring under egg */
#egg-stage::before {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 20px;
  background: radial-gradient(ellipse, rgba(245,197,66,0.35) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

/* ── SVG egg ── */
#egg-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
}

/* Egg halves — hidden until crack */
#egg-top, #egg-bottom { transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; }

/* Crack lines on egg */
#crack-lines { opacity: 0; transition: opacity 0.2s; }
#crack-lines.show { opacity: 1; }

/* Shake on tap */
@keyframes eggShake {
  0%,100% { transform: rotate(0deg) translateX(0); }
  15%      { transform: rotate(-6deg) translateX(-4px); }
  35%      { transform: rotate(7deg)  translateX(4px); }
  55%      { transform: rotate(-5deg) translateX(-3px); }
  75%      { transform: rotate(4deg)  translateX(3px); }
  90%      { transform: rotate(-2deg) translateX(-1px); }
}
.shaking { animation: eggShake 0.35s ease-in-out; }

/* Split open animation */
@keyframes splitTop {
  from { transform: translateY(0) rotate(0deg); opacity: 1; }
  to   { transform: translateY(-80px) rotate(-18deg); opacity: 0; }
}
@keyframes splitBottom {
  from { transform: translateY(0) rotate(0deg); opacity: 1; }
  to   { transform: translateY(60px) rotate(10deg); opacity: 0; }
}
.split-top    { animation: splitTop    0.5s 0.1s cubic-bezier(0.4,0,0.2,1) forwards; }
.split-bottom { animation: splitBottom 0.5s 0.1s cubic-bezier(0.4,0,0.2,1) forwards; }

/* New egg appear */
@keyframes eggAppear {
  from { transform: scale(0) translateY(30px); opacity: 0; }
  to   { transform: scale(1) translateY(0);    opacity: 1; }
}
.appearing { animation: eggAppear 0.5s 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }

/* ── Tap hint ── */
#tap-hint {
  font-size: clamp(13px, 2.8vw, 17px);
  color: var(--soft);
  text-align: center;
  font-weight: 600;
  letter-spacing: 0.03em;
  transition: opacity 0.3s;
}
#tap-hint span {
  display: inline-block;
  animation: hintBounce 1.6s ease-in-out infinite;
}
@keyframes hintBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ── Particle burst ── */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 50;
  animation: particleFly ease-out forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: var(--tx) scale(0.2);   opacity: 0; }
}

/* ── Reveal screen ── */
#reveal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background: radial-gradient(ellipse at center, #2d1b4e 0%, #1a1a2e 70%);
}
#reveal.show {
  display: flex;
  animation: revealPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes revealPop {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

#reveal .r-chick { font-size: clamp(60px, 15vw, 96px); margin-bottom: 0.4rem; animation: chickWobble 0.8s 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes chickWobble {
  from { transform: scale(0) rotate(-20deg); }
  to   { transform: scale(1) rotate(0deg); }
}

#reveal h2 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(38px, 10vw, 64px);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(245,197,66,0.6);
  line-height: 1;
  margin-bottom: 0.4rem;
}
#reveal .r-sub {
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 700;
  color: var(--white);
  margin-bottom: 0.5rem;
}
#reveal .r-body {
  font-size: clamp(13px, 2.5vw, 16px);
  color: var(--soft);
  max-width: 340px;
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 1.6rem;
}
#reveal .r-crack-count {
  font-size: 13px;
  color: #7a6f9a;
  margin-bottom: 1.4rem;
}

#reveal .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

.r-btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(13px, 3vw, 16px);
  padding: 12px 28px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: transform 0.15s, box-shadow 0.15s;
}
.r-btn:active { transform: scale(0.95); }

#btn-keep-going {
  background: var(--gold);
  color: #1a1a2e;
  box-shadow: 0 4px 0 var(--gold2), 0 6px 20px rgba(245,197,66,0.3);
}
#btn-keep-going:active { box-shadow: 0 1px 0 var(--gold2); transform: translateY(3px) scale(0.97); }

#btn-done {
  background: transparent;
  color: var(--soft);
  border: 1.5px solid rgba(200,192,216,0.3);
}
</style>
</head>
<body>

<div id="stars"></div>

<div id="app">
  <div id="header">
    <div id="eyebrow">🥚 Easter Egg Hunt</div>
    <h1 id="main-title">You Found<br>a Mystery Egg!</h1>
    <p id="subtitle">Crack it open to claim your prize...</p>
  </div>

  <div id="counter-wrap">
    <span id="counter-label">Cracks</span>
    <span id="counter-num">0</span>
  </div>

  <div id="egg-stage" id="egg-stage">
    <svg id="egg-svg" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="eggGrad" cx="38%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#fff9e6"/>
          <stop offset="60%"  stop-color="#f5e6a3"/>
          <stop offset="100%" stop-color="#c8a93a"/>
        </radialGradient>
        <radialGradient id="eggGrad2" cx="38%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#ffe0e0"/>
          <stop offset="60%"  stop-color="#f5a3a3"/>
          <stop offset="100%" stop-color="#c83a3a"/>
        </radialGradient>
        <radialGradient id="eggGrad3" cx="38%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#e0f0ff"/>
          <stop offset="60%"  stop-color="#a3c8f5"/>
          <stop offset="100%" stop-color="#3a6ec8"/>
        </radialGradient>
        <radialGradient id="eggGrad4" cx="38%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#e0ffe4"/>
          <stop offset="60%"  stop-color="#a3f5b0"/>
          <stop offset="100%" stop-color="#3ac850"/>
        </radialGradient>
        <radialGradient id="eggGrad5" cx="38%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#f5e0ff"/>
          <stop offset="60%"  stop-color="#d4a3f5"/>
          <stop offset="100%" stop-color="#8e3ac8"/>
        </radialGradient>
        <clipPath id="topClip">
          <rect x="0" y="0" width="200" height="130"/>
        </clipPath>
        <clipPath id="bottomClip">
          <rect x="0" y="120" width="200" height="130"/>
        </clipPath>
      </defs>

      <!-- Bottom half -->
      <g id="egg-bottom">
        <ellipse id="egg-shape-b" cx="100" cy="138" rx="72" ry="88" fill="url(#eggGrad)" clip-path="url(#bottomClip)"/>
        <!-- pattern stripes on bottom -->
        <g id="egg-deco-b" clip-path="url(#bottomClip)" opacity="0.25">
          <ellipse cx="100" cy="138" rx="72" ry="88" fill="none" stroke="#fff" stroke-width="8"/>
          <ellipse cx="100" cy="138" rx="55" ry="70" fill="none" stroke="#fff" stroke-width="5"/>
        </g>
      </g>

      <!-- Top half -->
      <g id="egg-top">
        <ellipse id="egg-shape-t" cx="100" cy="138" rx="72" ry="88" fill="url(#eggGrad)" clip-path="url(#topClip)"/>
        <g id="egg-deco-t" clip-path="url(#topClip)" opacity="0.25">
          <ellipse cx="100" cy="138" rx="72" ry="88" fill="none" stroke="#fff" stroke-width="8"/>
          <ellipse cx="100" cy="138" rx="55" ry="70" fill="none" stroke="#fff" stroke-width="5"/>
        </g>
        <!-- Shine -->
        <ellipse cx="78" cy="90" rx="14" ry="20" fill="rgba(255,255,255,0.22)" transform="rotate(-20 78 90)" clip-path="url(#topClip)"/>
      </g>

      <!-- Crack lines (shown before split) -->
      <g id="crack-lines">
        <polyline points="95,115 100,122 93,128 102,135 96,142" stroke="#5a4200" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
        <polyline points="100,122 108,118 112,124" stroke="#5a4200" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
        <polyline points="93,128 86,125" stroke="#5a4200" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <div id="tap-hint"><span>👆 Tap to crack!</span></div>
</div>

<!-- Reveal -->
<div id="reveal">
  <div class="r-chick">🐣</div>
  <h2>April Fools!</h2>
  <p class="r-sub">There was never a prize in there.</p>
  <p class="r-body">But 5 real QR codes are still hidden out there — and those ones actually hatch into something good!</p>
  <p class="r-crack-count" id="reveal-crack-count"></p>
  <div class="btn-row">
    <button class="r-btn" id="btn-keep-going">🥚 Keep cracking anyway</button>
    <button class="r-btn" id="btn-done">I'll go find a real one</button>
  </div>
</div>

<script>
// ── Egg colour palette ──
const EGG_GRADS = [
  'url(#eggGrad)',  // gold
  'url(#eggGrad2)', // red
  'url(#eggGrad3)', // blue
  'url(#eggGrad4)', // green
  'url(#eggGrad5)', // purple
];

// Stripe deco patterns per egg
const DECO_PATTERNS = [
  // stripes
  (g) => {
    g.innerHTML = `
      <ellipse cx="100" cy="138" rx="72" ry="88" fill="none" stroke="#fff" stroke-width="8" clip-path="url(#topClip)"/>
      <ellipse cx="100" cy="138" rx="55" ry="70" fill="none" stroke="#fff" stroke-width="5" clip-path="url(#topClip)"/>`;
  },
  // dots
  (g) => {
    let d = '';
    for (let i = 0; i < 8; i++) d += `<circle cx="${60+i*12}" cy="${105+((i%2)*14)}" r="5" fill="#fff" opacity="0.5"/>`;
    g.innerHTML = d;
  },
  // zigzag
  (g) => {
    g.innerHTML = `<polyline points="55,118 70,108 85,118 100,108 115,118 130,108 145,118" stroke="#fff" stroke-width="5" fill="none" opacity="0.5"/>`;
  },
  // diamonds
  (g) => {
    let d = '';
    [[80,100],[120,100],[100,115]].forEach(([x,y]) => {
      d += `<polygon points="${x},${y-8} ${x+7},${y} ${x},${y+8} ${x-7},${y}" fill="#fff" opacity="0.4"/>`;
    });
    g.innerHTML = d;
  },
  // stars
  (g) => {
    g.innerHTML = `
      <text x="72"  y="115" font-size="18" fill="#fff" opacity="0.45" text-anchor="middle">★</text>
      <text x="100" y="108" font-size="14" fill="#fff" opacity="0.35" text-anchor="middle">★</text>
      <text x="128" y="115" font-size="18" fill="#fff" opacity="0.45" text-anchor="middle">★</text>`;
  },
];

const MESSAGES = [
  "Crack it open to claim your prize...",
  "There must be something inside...",
  "Just one more...",
  "It has to be in this one...",
  "Surely THIS one has the prize...",
  "You're so close. Probably.",
  "Any egg now...",
  "Okay this is getting weird.",
  "Are you... enjoying this?",
  "There's nothing in here. Or is there?",
  "You've cracked more eggs than a chef.",
  "A prize egg exists. Somewhere.",
  "This one feels different. It doesn't.",
  "Your persistence is impressive.",
  "Legend says egg #∞ has the prize.",
];

const HINT_TEXTS = [
  "👆 Tap to crack!",
  "👆 Crack it open!",
  "👆 Just one tap...",
  "👆 Go on then.",
  "👆 You know you want to.",
  "👆 ...tap it.",
  "👆 Another one?",
  "👆 Crack.",
  "👆 Tap.",
  "👆 ...",
];

let cracks = 0;
let cracking = false;
let revealShown = false;
let keepGoing = false;

const eggStage  = document.getElementById('egg-stage');
const eggTop    = document.getElementById('egg-top');
const eggBottom = document.getElementById('egg-bottom');
const crackLines= document.getElementById('crack-lines');
const tapHint   = document.getElementById('tap-hint');
const counterWrap = document.getElementById('counter-wrap');
const counterNum  = document.getElementById('counter-num');
const subtitle    = document.getElementById('subtitle');
const reveal      = document.getElementById('reveal');
const revealCount = document.getElementById('reveal-crack-count');
const eggShapeT   = document.getElementById('egg-shape-t');
const eggShapeB   = document.getElementById('egg-shape-b');
const eggDecoT    = document.getElementById('egg-deco-t');
const eggDecoB    = document.getElementById('egg-deco-b');

// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = 1 + Math.random() * 2.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

// ── Particles ──
function burst(x, y, color) {
  const COLORS = ['#f5c542','#f5a3a3','#a3c8f5','#a3f5b0','#d4a3f5','#fff','#ffcc80'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 5 + Math.random() * 8;
    const angle = (Math.PI * 2 * i) / 18 + (Math.random() * 0.4);
    const dist = 60 + Math.random() * 100;
    const tx = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;background:${COLORS[i%COLORS.length]};--tx:${tx};animation-duration:${0.5+Math.random()*0.4}s`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ── Apply egg appearance ──
function applyEggStyle(idx) {
  const grad = EGG_GRADS[idx % EGG_GRADS.length];
  eggShapeT.setAttribute('fill', grad);
  eggShapeB.setAttribute('fill', grad);
  const decoFn = DECO_PATTERNS[idx % DECO_PATTERNS.length];
  decoFn(eggDecoT);
  // mirror deco to bottom (simplified)
  const decoB = document.createElementNS('http://www.w3.org/2000/svg','g');
  decoB.setAttribute('clip-path','url(#bottomClip)');
  decoB.setAttribute('opacity','0.25');
  decoFn(decoB);
  eggDecoB.innerHTML = decoB.innerHTML;
}

// ── Bump counter ──
function bumpCounter() {
  counterNum.textContent = cracks;
  counterNum.classList.remove('bump');
  void counterNum.offsetWidth;
  counterNum.classList.add('bump');
  counterNum.addEventListener('transitionend', () => counterNum.classList.remove('bump'), { once: true });
}

// ── Do crack ──
function doCrack() {
  if (cracking) return;
  cracking = true;

  // Phase 1: shake + show cracks
  eggStage.classList.add('shaking');
  crackLines.classList.add('show');

  // Get center for particles
  const r = eggStage.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;

  eggStage.addEventListener('animationend', () => {
    eggStage.classList.remove('shaking');

    // Phase 2: split open
    eggTop.classList.add('split-top');
    eggBottom.classList.add('split-bottom');
    burst(cx, cy, '#f5c542');

    setTimeout(() => {
      cracks++;
      bumpCounter();
      counterWrap.classList.add('visible');

      // Update subtitle
      const msgIdx = Math.min(cracks - 1, MESSAGES.length - 1);
      subtitle.textContent = MESSAGES[msgIdx];

      // Update hint
      const hintIdx = Math.min(Math.floor(cracks / 2), HINT_TEXTS.length - 1);
      tapHint.querySelector('span').textContent = HINT_TEXTS[hintIdx];

      // Check if reveal should show (first time at 5, or keep going mode)
      if (cracks === 5 && !keepGoing) {
        revealCount.textContent = `You cracked ${cracks} eggs. Not bad.`;
        reveal.classList.add('show');
        cracking = false;
        return;
      }

      // Phase 3: reset with new egg
      eggTop.classList.remove('split-top');
      eggBottom.classList.remove('split-bottom');
      crackLines.classList.remove('show');

      // New egg style
      applyEggStyle(cracks);

      // Appear animation
      eggStage.classList.add('appearing');
      eggStage.addEventListener('animationend', () => {
        eggStage.classList.remove('appearing');
        cracking = false;
      }, { once: true });

    }, 500);
  }, { once: true });
}

// ── Tap / click ──
eggStage.addEventListener('click', doCrack);
eggStage.addEventListener('touchstart', (e) => {
  e.preventDefault();
  doCrack();
}, { passive: false });

// ── Reveal buttons ──
document.getElementById('btn-keep-going').addEventListener('click', () => {
  keepGoing = true;
  reveal.classList.remove('show');
  reveal.style.display = 'none';

  // Reset egg for more cracking
  applyEggStyle(cracks);
  eggTop.classList.remove('split-top');
  eggBottom.classList.remove('split-bottom');
  crackLines.classList.remove('show');
  cracking = false;
});

document.getElementById('btn-done').addEventListener('click', () => {
  // Nothing — just stays on reveal
});
</script>
  <script data-goatcounter="https://YOURSITE.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
