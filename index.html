<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Egg Hunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #080400;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse 70% 65% at 50% 50%,
      transparent 25%, rgba(4,2,0,0.5) 65%, rgba(4,2,0,0.92) 100%);
    pointer-events: none;
  }

  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    animation: stageIn 1.8s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes stageIn {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* EGG */
  .egg-container {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 16px;
  }
  .egg-halo-outer {
    position: absolute;
    inset: -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,229,102,0.13) 0%, transparent 65%);
    animation: halopulse 3s 0.5s ease-in-out infinite;
  }
  .egg-halo {
    position: absolute;
    inset: -28px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,60,0.38) 0%, rgba(245,166,35,0.12) 50%, transparent 70%);
    animation: halopulse 3s ease-in-out infinite;
  }
  @keyframes halopulse {
    0%,100% { transform: scale(0.92); opacity: 0.7; }
    50%      { transform: scale(1.12); opacity: 1; }
  }
  .egg-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 104px;
    filter:
      drop-shadow(0 0 18px rgba(255,215,40,0.95))
      drop-shadow(0 0 55px rgba(245,160,20,0.65))
      drop-shadow(0 6px 16px rgba(0,0,0,0.6));
    animation: eggsway 5s ease-in-out infinite;
  }
  @keyframes eggsway {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-16px) rotate(3deg); }
  }

  /* TEXT */
  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: rgba(255,200,70,0.65);
    margin-bottom: 16px;
    animation: stageIn 1.8s 0.12s both;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900;
    font-size: clamp(52px, 11vw, 92px);
    line-height: 0.93;
    letter-spacing: -0.025em;
    background: linear-gradient(160deg, #fff5b0 0%, #ffe55a 28%, #f5a520 62%, #c07000 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    animation: stageIn 1.8s 0.18s both;
  }
  h1 em {
    display: block;
    font-style: italic;
  }

  .subtitle {
    font-size: clamp(15px, 2.4vw, 17px);
    font-weight: 300;
    color: rgba(255,235,185,0.68);
    line-height: 1.7;
    max-width: 370px;
    margin-top: 22px;
    margin-bottom: 30px;
    animation: stageIn 1.8s 0.28s both;
  }
  .subtitle strong {
    color: #ffe97a;
    font-weight: 500;
    font-style: italic;
  }

  /* PILLS */
  .clues {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 28px;
    animation: stageIn 1.8s 0.38s both;
  }
  .clue {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px 7px 12px;
    border-radius: 40px;
    border: 1px solid rgba(255,210,70,0.2);
    background: rgba(255,190,40,0.07);
    font-size: 13px;
    color: rgba(255,230,150,0.75);
    backdrop-filter: blur(8px);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,210,70,0.5);
    flex-shrink: 0;
  }

  /* COUNTER */
  .counter-wrap {
    margin-bottom: 32px;
    animation: stageIn 1.8s 0.44s both;
  }
  #counter {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: rgba(255,205,80,0.5);
    transition: color 0.5s;
  }

  /* BUTTON */
  .btn-wrap { animation: stageIn 1.8s 0.52s both; }

  .btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 13px;
    padding: 20px 48px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    overflow: hidden;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.07em;
    color: #160900;
    background: linear-gradient(130deg, #ffee88 0%, #f5c118 42%, #e8820c 100%);
    box-shadow:
      0 0 0 1px rgba(255,195,40,0.18),
      0 6px 30px rgba(245,193,24,0.45),
      0 20px 70px rgba(200,110,0,0.28);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .btn-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg,
      transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    transform: translateX(-120%);
    animation: shimmer 4s 2.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(220%); }
  }
  .btn:hover {
    transform: translateY(-4px) scale(1.025);
    box-shadow:
      0 0 0 1px rgba(255,195,40,0.28),
      0 12px 50px rgba(245,193,24,0.58),
      0 28px 90px rgba(200,110,0,0.38);
  }
  .btn:active { transform: translateY(-1px) scale(1.01); }
  .btn-icon, .btn-text { position: relative; z-index: 1; }
  .btn-icon { font-size: 20px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="vignette"></div>

<div class="stage">
  <div class="egg-container">
    <div class="egg-halo-outer"></div>
    <div class="egg-halo"></div>
    <div class="egg-emoji">🥚</div>
  </div>

  <p class="eyebrow">— A Mystery Unfolds —</p>

  <h1>Golden<em>Egg Hunt</em></h1>

  <p class="subtitle">
    Hidden across this building are <strong>5 secret words</strong>.<br>
    Scan the clues. Gather them all.<br>
    Speak the incantation. Claim the <strong>Golden Egg</strong>.
  </p>

  <div class="clues">
    <div class="clue"><div class="dot"></div>Scan QR codes</div>
    <div class="clue"><div class="dot"></div>Collect 5 words</div>
    <div class="clue"><div class="dot"></div>Unlock the egg</div>
  </div>

  <div class="counter-wrap">
    <span id="counter">✦ &nbsp;Checking hunt activity…</span>
  </div>

  <div class="btn-wrap">
    <a href="final.html" class="btn">
      <span class="btn-icon">🔓</span>
      <span class="btn-text">Unlock the Golden Egg</span>
      <div class="btn-shimmer"></div>
    </a>
  </div>
</div>

<script>
/* ── Particle / orb engine ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
const mouse = { x: -9999, y: -9999 };

function rand(a, b) { return a + Math.random() * (b - a); }

/* Small floating sparks */
class Spark {
  constructor(full) {
    this.init(full);
  }
  init(full) {
    this.x  = rand(0, W || window.innerWidth);
    this.y  = full ? rand(0, H || window.innerHeight) : (H + 8);
    this.vx = rand(-0.18, 0.18);
    this.vy = rand(-0.5, -0.08);
    this.r  = rand(0.8, 3.2);
    this.baseAlpha = rand(0.12, 0.82);
    this.phase  = rand(0, Math.PI * 2);
    this.freq   = rand(0.006, 0.02);
    this.hue    = rand(36, 54);
  }
  update() {
    this.phase += this.freq;
    this.x += this.vx + Math.sin(this.phase * 0.6) * 0.14;
    this.y += this.vy;
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const d = Math.hypot(dx, dy);
    if (d < 120) {
      const f = ((120 - d) / 120) * 0.7;
      this.x += (dx / d) * f;
      this.y += (dy / d) * f;
    }
    if (this.y < -10) this.init(false);
  }
  draw() {
    const a = this.baseAlpha * (0.55 + 0.45 * Math.sin(this.phase));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},100%,72%,${a})`;
    ctx.fill();
  }
}

/* Large drifting glow orbs */
class Orb {
  constructor() { this.init(); }
  init() {
    this.x  = rand(0, W || window.innerWidth);
    this.y  = rand(0, H || window.innerHeight);
    this.r  = rand(80, 240);
    this.vx = rand(-0.07, 0.07);
    this.vy = rand(-0.06, 0.06);
    this.a  = rand(0.04, 0.1);
    this.hue = rand(36, 52);
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -this.r*2) this.x = W + this.r;
    if (this.x > W + this.r*2) this.x = -this.r;
    if (this.y < -this.r*2) this.y = H + this.r;
    if (this.y > H + this.r*2) this.y = -this.r;
  }
  draw() {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0, `hsla(${this.hue},100%,58%,${this.a})`);
    g.addColorStop(1, `hsla(${this.hue},80%,38%,0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

let sparks, orbs;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function init() {
  resize();
  sparks = Array.from({ length: 140 }, (_, i) => new Spark(true));
  orbs   = Array.from({ length: 7  }, () => new Orb());
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H) * 0.85);
  bg.addColorStop(0,   'rgba(46,20,0,1)');
  bg.addColorStop(0.45,'rgba(20,8,0,1)');
  bg.addColorStop(1,   'rgba(5,2,0,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  orbs.forEach(o => { o.update(); o.draw(); });
  sparks.forEach(s => { s.update(); s.draw(); });

  requestAnimationFrame(loop);
}

window.addEventListener('resize', init);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });

init();
loop();

/* ── Counter ── */
const MSGS = [
  [60, "🏆 The Golden Egg is nearly found!"],
  [30, "🔥 The hunt is heating up!"],
  [10, "🥚 Eggs are being discovered!"],
  [0,  "✦  The hunt has just begun…"],
];
function label(n) {
  for (const [t, m] of MSGS) if (n >= t) return m;
  return MSGS[MSGS.length - 1][1];
}
function updateCounter() {
  fetch("https://golden-egg-hunt.goatcounter.com/counter/TOTAL.json")
    .then(r => r.json())
    .then(d => {
      const n = d.count ?? 0;
      document.getElementById('counter').textContent = `${label(n)}  (${n} scans)`;
    })
    .catch(() => {
      document.getElementById('counter').textContent = "✦  The hunt is underway…";
    });
}
updateCounter();
setInterval(updateCounter, 10000);
</script>
</body>
</html>
